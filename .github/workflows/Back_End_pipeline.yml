name: Build and deploy .NET application to container app productsapiapi-app-2026041612285

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  CONTAINER_APP_CONTAINER_NAME: products-api
  CONTAINER_APP_NAME: productsapiapi-app-2026041612285
  CONTAINER_APP_RESOURCE_GROUP_NAME: AUSLAND
  CONTAINER_REGISTRY_LOGIN_SERVER: productsapiapi20260416123442.azurecr.io
  DOCKER_FILE_PATH: ProductsAPI/Dockerfile
  PROJECT_NAME_FOR_DOCKER: productsapiapi

jobs:
  test:
    name: Build e testes unitários
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restaurar dependências
        run: dotnet restore

      - name: Testes unitários
        run: dotnet test ProductAPI.UnitTests/ProductAPI.UnitTests.csproj --no-restore --configuration Release --verbosity normal

  build:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.ProductsAPIAPI20260416123442_USERNAME_2200 }}
          password: ${{ secrets.ProductsAPIAPI20260416123442_PASSWORD_2200 }}

      - name: Build e push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ProductsAPI/Dockerfile
          push: true
          tags: ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.PROJECT_NAME_FOR_DOCKER }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy para Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az config set extension.use_dynamic_install=yes_without_prompt

            az containerapp registry set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} \
              --server ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }} \
              --username ${{ secrets.ProductsAPIAPI20260416123442_USERNAME_2200 }} \
              --password ${{ secrets.ProductsAPIAPI20260416123442_PASSWORD_2200 }}

            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --container-name ${{ env.CONTAINER_APP_CONTAINER_NAME }} \
              --resource-group ${{ env.CONTAINER_APP_RESOURCE_GROUP_NAME }} \
              --image ${{ env.CONTAINER_REGISTRY_LOGIN_SERVER }}/${{ env.PROJECT_NAME_FOR_DOCKER }}:${{ github.sha }}

      - name: Logout Azure
        run: az logout