services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ProductsAPI/Dockerfile
    ports:
      - "7121:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ProductsDb: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiresInMinutes: ${JWT_EXPIRES_IN_MINUTES}
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_0}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_1}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: products-app
      dockerfile: Dockerfile
    ports:
      - "4200:4000"
    environment:
      PORT: 4000
    depends_on:
      - api
