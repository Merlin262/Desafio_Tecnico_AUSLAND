version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: products_db
    environment:
      POSTGRES_DB: ProductsDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./ProductsAPI
      dockerfile: Dockerfile
    container_name: products_api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=ProductsDb;Username=postgres;Password=postgres123
      - Jwt__Key=sua-chave-super-secreta-com-32-caracteres!!
      - Jwt__Issuer=ProductsAPI
      - Jwt__Audience=ProductsApp
      - Jwt__ExpiresInMinutes=60
    depends_on:
      postgres:
        condition: service_healthy  # espera o banco estar pronto

  frontend:
    build:
      context: ./products-app
      dockerfile: Dockerfile
    container_name: products_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data: